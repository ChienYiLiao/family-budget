<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>家庭記帳本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    body { background: #0d0d1a; }
  </style>
</head>
<body>
  <div id="login-page">
    <div class="login-logo">💰</div>
    <div class="login-title">家庭記帳本</div>
    <div class="login-subtitle">請選擇你是誰</div>

    <div class="login-users">
      <!-- 豬豬 -->
      <div class="login-user-card" id="btn-pigpig"
           onclick="selectUser('user_pigpig')"
           oncontextmenu="changeAvatar('user_pigpig');return false;"
           onlong-press="changeAvatar('user_pigpig')">
        <img class="login-user-avatar" id="avatar-pigpig"
             src="assets/default-avatars/pigpig.png"
             onerror="this.src='assets/default-avatars/pigpig.png'"
             alt="豬豬">
        <div class="login-user-name">豬豬</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);">長按更換頭像</div>
      </div>

      <!-- 滾滾 -->
      <div class="login-user-card" id="btn-gungun"
           onclick="selectUser('user_gungun')"
           oncontextmenu="changeAvatar('user_gungun');return false;"
           onlong-press="changeAvatar('user_gungun')">
        <img class="login-user-avatar" id="avatar-gungun"
             src="assets/default-avatars/gungun.png"
             onerror="this.src='assets/default-avatars/gungun.png'"
             alt="滾滾">
        <div class="login-user-name">滾滾</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);">長按更換頭像</div>
      </div>
    </div>

    <div class="login-hint">長按頭像可以更換大頭貼</div>
  </div>

  <!-- Loading -->
  <div class="loader-overlay" id="loader-overlay">
    <div class="loader-spinner"></div>
    <div class="loader-text">載入中...</div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/loader.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/avatar-cropper.js"></script>
  <!-- Cropper.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

  <script>
    // ── 初始化：載入頭像快取 ───────────────────────────────────────────────
    (function initAvatars() {
      ['user_pigpig','user_gungun'].forEach(uid => {
        const cached = State.getAvatarCache(uid);
        const avatarKey = uid === 'user_pigpig' ? 'pigpig' : 'gungun';
        if (cached) {
          const img = document.getElementById(`avatar-${avatarKey}`);
          if (img) img.src = cached;
        }
      });
    })();

    // ── 選擇使用者 ─────────────────────────────────────────────────────────
    function selectUser(userId) {
      const cfg = CONFIG.USERS[userId];
      const avatarKey = userId === 'user_pigpig' ? 'pigpig' : 'gungun';
      const img = document.getElementById(`avatar-${avatarKey}`);
      State.saveUser({
        userId,
        displayName: cfg.displayName,
        avatarUrl: img ? img.src : cfg.defaultAvatar
      });
      window.location.href = 'app.html#dashboard';
    }

    // ── 長按換頭像 ─────────────────────────────────────────────────────────
    function changeAvatar(userId) {
      const avatarKey = userId === 'user_pigpig' ? 'pigpig' : 'gungun';
      showAvatarMenu(userId, avatarKey);
    }

    function showAvatarMenu(userId, avatarKey) {
      // 建立選擇 modal
      let overlay = document.getElementById('avatar-menu-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'avatar-menu-overlay';
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title">更換頭像</div>
            <div style="display:flex;flex-direction:column;gap:12px;">
              <button class="btn btn-secondary btn-block" id="av-camera">📷 拍攝</button>
              <button class="btn btn-secondary btn-block" id="av-gallery">🖼️ 從相簿選擇</button>
              <button class="btn btn-ghost btn-block" id="av-cancel">取消</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.onclick = e => { if (e.target === overlay) Modal.hide('avatar-menu-overlay'); };
        document.getElementById('av-cancel').onclick = () => Modal.hide('avatar-menu-overlay');
      }

      document.getElementById('av-camera').onclick = () => {
        Modal.hide('avatar-menu-overlay');
        AvatarCropper.pick('camera', result => uploadAvatar(userId, avatarKey, result));
      };
      document.getElementById('av-gallery').onclick = () => {
        Modal.hide('avatar-menu-overlay');
        AvatarCropper.pick('gallery', result => uploadAvatar(userId, avatarKey, result));
      };

      Modal.show('avatar-menu-overlay');
    }

    async function uploadAvatar(userId, avatarKey, { base64, mimeType, dataUrl }) {
      Loader.show('更新頭像中...');
      try {
        const img = document.getElementById(`avatar-${avatarKey}`);
        if (img) img.src = dataUrl;
        // 直接存 localStorage，不需上傳至後端
        State.saveAvatarCache(userId, dataUrl);
        Toast.success('頭像更新成功！');
      } catch (err) {
        Toast.error('頭像更新失敗：' + err.message);
      } finally {
        Loader.hide();
      }
    }

    // ── 長按事件 ──────────────────────────────────────────────────────────
    ['user_pigpig','user_gungun'].forEach(userId => {
      const avatarKey = userId === 'user_pigpig' ? 'pigpig' : 'gungun';
      const card = document.getElementById(`btn-${avatarKey}`);
      if (!card) return;
      let pressTimer;
      card.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => changeAvatar(userId), 600);
      }, { passive: true });
      card.addEventListener('touchend', () => clearTimeout(pressTimer));
      card.addEventListener('touchmove', () => clearTimeout(pressTimer), { passive: true });
    });
  </script>
</body>
</html>
